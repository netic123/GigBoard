name: Deploy Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AZURE_RESOURCE_GROUP: 'gigboard-rg'
  AZURE_LOCATION: 'swedencentral'

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Bicep Template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./azure/main.bicep
          parameters: >
            appName=gigboard
            location=${{ env.AZURE_LOCATION }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            jwtKey=${{ secrets.JWT_KEY }}
          failOnStdErr: false

      - name: Get Deployment Outputs
        id: deploy-outputs
        run: |
          outputs=$(az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query properties.outputs)
          echo "API_URL=$(echo $outputs | jq -r '.apiAppUrl.value')" >> $GITHUB_OUTPUT
          echo "WEB_URL=$(echo $outputs | jq -r '.staticWebAppUrl.value')" >> $GITHUB_OUTPUT
          echo "API_APP_NAME=$(echo $outputs | jq -r '.apiAppName.value')" >> $GITHUB_OUTPUT
          echo "STATIC_WEB_APP_NAME=$(echo $outputs | jq -r '.staticWebAppName.value')" >> $GITHUB_OUTPUT

      - name: Display Deployment Info
        run: |
          echo "### Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ steps.deploy-outputs.outputs.API_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ steps.deploy-outputs.outputs.WEB_URL }} |" >> $GITHUB_STEP_SUMMARY

      - name: Azure Logout
        run: az logout
        if: always()

